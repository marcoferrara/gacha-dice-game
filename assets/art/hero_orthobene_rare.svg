<svg width="300" height="420" viewBox="0 0 100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sfondo Carta R -->
  <rect x="3" y="3" width="94" height="134" rx="8" fill="url(#bgGradOrthobene)" stroke="#3182ce" stroke-width="2"/>
  
  <!-- Glifi neurali geometrici blu in background -->
  <path d="M20 30 L40 15 L50 25 L30 45" stroke="#90cdf4" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Gigante di Mont'e Prama -->
  <!-- Testa di pietra squadrata -->
  <rect x="42" y="24" width="16" height="18" rx="2" fill="#718096" stroke="#4a5568" stroke-width="1.5"/>
  <!-- Caratteristici Occhi a Doppio Cerchio Concentrico del Gigante -->
  <circle cx="46" cy="30" r="3" fill="none" stroke="#90cdf4" stroke-width="0.8"/>
  <circle cx="46" cy="30" r="1" fill="#fff"/>
  <circle cx="54" cy="30" r="3" fill="none" stroke="#90cdf4" stroke-width="0.8"/>
  <circle cx="54" cy="30" r="1" fill="#fff"/>
  <!-- Trattino a T nasale -->
  <path d="M50 28 L50 35 M47 35 L53 35" stroke="#4a5568" stroke-width="1.2"/>
  
  <!-- Scudo rettangolare tenuto sopra la testa protettivo -->
  <rect x="25" y="10" width="50" height="10" rx="2" fill="#4a5568" stroke="#3182ce" stroke-width="1.2"/>
  <path d="M25 15 L75 15" stroke="#90cdf4" stroke-width="0.8" stroke-dasharray="2 2"/>
  <!-- Braccio di roccia che solleva lo scudo -->
  <path d="M48 20 L48 24 M52 20 L52 24" stroke="#4a5568" stroke-width="3"/>
  
  <!-- Spalliere di basalto massicce -->
  <path d="M22 60 L78 60 L70 42 L30 42 Z" fill="#2d3748" stroke="#4a5568" stroke-width="1.5"/>
  <!-- Pugno di pietra -->
  <circle cx="50" cy="70" r="8" fill="#718096" stroke="#4a5568" stroke-width="1"/>
  
  <!-- Cornice R -->
  <rect x="7" y="7" width="86" height="126" rx="6" fill="none" stroke="#90cdf4" stroke-width="0.8" opacity="0.6"/>
  <!-- Targa del Nome -->
  <rect x="15" y="112" width="70" height="18" rx="3" fill="#1a365d" stroke="#3182ce" stroke-width="1"/>
  <text x="50" y="122" fill="#90cdf4" font-family="serif" font-size="7.5" font-weight="bold" text-anchor="middle" letter-spacing="0.5">ORTHOBENE (R)</text>
  <text x="50" y="128" fill="#63b3ed" font-family="sans-serif" font-size="5" text-anchor="middle">GIGANTE TANK</text>

  <defs>
    <linearGradient id="bgGradOrthobene" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f253d"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
</svg>