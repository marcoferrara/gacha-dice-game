<svg width="300" height="420" viewBox="0 0 100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sfondo Carta SR -->
  <rect x="3" y="3" width="94" height="134" rx="8" fill="url(#bgGradAmsicora)" stroke="#c8a76b" stroke-width="2"/>
  
  <!-- Raggi solari nello sfondo -->
  <path d="M50 55 L10 -10 M50 55 L50 -20 M50 55 L90 -10 M50 55 L110 50 M50 55 L-10 50" stroke="#fcf3db" stroke-width="0.5" opacity="0.25"/>
  
  <!-- Silouhette dorata del mitico Guerriero Shardana -->
  <!-- Testa ed elmo cornuto cerimoniale -->
  <path d="M50 30 C53 30, 56 33, 56 38 C56 42, 54 44, 50 44 C46 44, 44 42, 44 38 C44 33, 47 30, 50 30 Z" fill="#e0c79b"/>
  <!-- Corna tipiche shardana ricurve -->
  <path d="M47 31 C40 22, 38 15, 39 12 C40 14, 44 20, 48 29" fill="none" stroke="#fff4d4" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M53 31 C60 22, 62 15, 61 12 C60 14, 56 20, 52 29" fill="none" stroke="#fff4d4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sfere decorative sulle punte delle corna -->
  <circle cx="39" cy="11" r="2" fill="#fff4d4"/>
  <circle cx="61" cy="11" r="2" fill="#fff4d4"/>
  
  <!-- Spalla e Armatura in bronzo dorato -->
  <path d="M30 65 L70 65 L65 48 L35 48 Z" fill="#c8a76b" stroke="#8e6f3e" stroke-width="1.5"/>
  <!-- Scudo Shardana circolare sul petto/spalla -->
  <circle cx="50" cy="72" r="16" fill="url(#shieldGrad)" stroke="#e0c79b" stroke-width="1.5"/>
  <!-- Centro scudo con sporgenza (umbo) -->
  <circle cx="50" cy="72" r="3.5" fill="#5c441c"/>
  
  <!-- Impugnatura della spada di bronzo -->
  <path d="M26 45 L26 85" stroke="#fff4d4" stroke-width="2" stroke-linecap="round"/>
  <path d="M22 48 L30 48" stroke="#fff4d4" stroke-width="1.5"/>
  
  <!-- Cornice dorata SR -->
  <rect x="7" y="7" width="86" height="126" rx="6" fill="none" stroke="#e0c79b" stroke-width="0.8" opacity="0.6"/>
  <!-- Targa del Nome -->
  <rect x="15" y="112" width="70" height="18" rx="3" fill="#5c441c" stroke="#c8a76b" stroke-width="1"/>
  <text x="50" y="122" fill="#fff4d4" font-family="serif" font-size="7.5" font-weight="bold" text-anchor="middle" letter-spacing="0.5">AMSICORA (SR)</text>
  <text x="50" y="128" fill="#e0c79b" font-family="sans-serif" font-size="5" text-anchor="middle">SHARDANA GUERRIERO</text>

  <defs>
    <linearGradient id="bgGradAmsicora" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d2a0a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff4d4"/>
      <stop offset="100%" stop-color="#8e6f3e"/>
    </linearGradient>
  </defs>
</svg>