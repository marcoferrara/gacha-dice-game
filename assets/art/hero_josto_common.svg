<svg width="300" height="420" viewBox="0 0 100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sfondo Carta C -->
  <rect x="3" y="3" width="94" height="134" rx="8" fill="url(#bgGradJosto)" stroke="#8e9aa6" stroke-width="2"/>
  
  <!-- Elementi foresta/natura sarda stilizzati in background -->
  <path d="M15 85 L20 60 L30 75 M85 85 L75 55 L65 70" stroke="#4a5568" stroke-width="1" opacity="0.3"/>
  
  <!-- Cacciatore Josto -->
  <!-- Cappuccio di panno orbace nero/marrone -->
  <path d="M50 28 C45 28, 41 33, 41 40 C41 47, 45 52, 50 52 C55 52, 59 47, 59 40 C59 33, 55 28, 50 28 Z" fill="#2d3748"/>
  <circle cx="50" cy="40" r="6" fill="#e0c79b"/>
  
  <!-- Abito barbaricino rustico con pelli di capra -->
  <path d="M34 75 L66 75 L58 52 L42 52 Z" fill="#4a3728" stroke="#2d3748" stroke-width="1"/>
  <!-- Gilet di capra smanicato grigio/bianco -->
  <path d="M42 52 L58 52 L54 75 L46 75 Z" fill="#cbd5e0" stroke="#718096" stroke-width="0.8"/>
  
  <!-- Arco da caccia in legno semplice -->
  <path d="M72 35 C78 50, 78 70, 72 85" fill="none" stroke="#744210" stroke-width="2" stroke-linecap="round"/>
  <path d="M72 36 L72 84" stroke="#e2e8f0" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Cornice C -->
  <rect x="7" y="7" width="86" height="126" rx="6" fill="none" stroke="#cbd5e0" stroke-width="0.8" opacity="0.5"/>
  <!-- Targa del Nome -->
  <rect x="15" y="112" width="70" height="18" rx="3" fill="#3a4147" stroke="#8e9aa6" stroke-width="1"/>
  <text x="50" y="122" fill="#cbd5e0" font-family="serif" font-size="7.5" font-weight="bold" text-anchor="middle" letter-spacing="0.5">JOSTO (C)</text>
  <text x="50" y="128" fill="#a0aec0" font-family="sans-serif" font-size="5" text-anchor="middle">SHARDANA CACCIATORE</text>

  <defs>
    <linearGradient id="bgGradJosto" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2429"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
</svg>