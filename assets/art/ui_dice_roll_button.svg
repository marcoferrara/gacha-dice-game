<svg width="256" height="256" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Base ombra -->
  <rect x="15" y="20" width="70" height="70" rx="16" fill="#030406" opacity="0.6"/>
  <!-- Dado Cubico 3D oro satinato -->
  <rect x="12" y="12" width="76" height="76" rx="18" fill="url(#diceGrad)" stroke="#8e6f3e" stroke-width="3"/>
  <!-- Decorazioni in filigrana angolari -->
  <rect x="20" y="20" width="60" height="60" rx="10" fill="none" stroke="#e0c79b" stroke-width="1" opacity="0.4"/>
  <!-- Faccia del dado con i 6 punti (Simbolo sole/evocazione sarda) -->
  <!-- Punti disposti per mostrare il valore '6' in oro lucido -->
  <circle cx="32" cy="32" r="5" fill="#fcf3db" stroke="#8e6f3e" stroke-width="1"/>
  <circle cx="32" cy="50" r="5" fill="#fcf3db" stroke="#8e6f3e" stroke-width="1"/>
  <circle cx="32" cy="68" r="5" fill="#fcf3db" stroke="#8e6f3e" stroke-width="1"/>
  <circle cx="68" cy="32" r="5" fill="#fcf3db" stroke="#8e6f3e" stroke-width="1"/>
  <circle cx="68" cy="50" r="5" fill="#fcf3db" stroke="#8e6f3e" stroke-width="1"/>
  <circle cx="68" cy="68" r="5" fill="#fcf3db" stroke="#8e6f3e" stroke-width="1"/>
  <!-- Scritta incisa 'AIjò' sul bordo superiore -->
  <text x="50" y="28" fill="#8e6f3e" font-family="serif" font-size="8" font-weight="bold" text-anchor="middle" letter-spacing="1">AIjò</text>
  <defs>
    <linearGradient id="diceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff4d4"/>
      <stop offset="30%" stop-color="#e0c79b"/>
      <stop offset="70%" stop-color="#c8a76b"/>
      <stop offset="100%" stop-color="#5c441c"/>
    </linearGradient>
  </defs>
</svg>